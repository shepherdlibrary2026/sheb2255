<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard | The Shepherd's Library</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
    body{background:#f8fafc;color:#0f172a}
    .dashboard{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .sidebar{background:#0f172a;color:white;padding:28px}
    .logo{font-size:24px;font-weight:900;margin-bottom:35px;color:#fde68a}
    .nav-item{padding:14px 16px;border-radius:14px;margin-bottom:8px;cursor:pointer;color:#cbd5e1;font-weight:700}
    .nav-item:hover,.nav-item.active{background:#1e3a8a;color:white}
    .main{padding:30px}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
    .topbar h1{font-size:34px}
    .topbar p{color:#64748b}
    .profile{display:flex;gap:12px;align-items:center;background:white;border:1px solid #e2e8f0;padding:12px 18px;border-radius:999px}
    .avatar{width:38px;height:38px;border-radius:50%;background:#1e3a8a;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:28px}
    .card{background:white;border:1px solid #e2e8f0;border-radius:22px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,.05)}
    .card h3{color:#64748b;font-size:14px;margin-bottom:8px}
    .card strong{font-size:34px;color:#1e3a8a}
    .content-grid{display:grid;grid-template-columns:1.3fr .7fr;gap:24px}
    textarea,input{width:100%;padding:14px;border:1px solid #cbd5e1;border-radius:12px;margin:8px 0 14px}
    textarea{min-height:120px}
    button{border:0;background:#1e3a8a;color:white;padding:13px 22px;border-radius:999px;font-weight:900;cursor:pointer}
    .light-btn{background:#e0e7ff;color:#1e3a8a}
    .list-item{padding:16px;border-bottom:1px solid #e2e8f0}
    .list-item h4{margin-bottom:6px}
    .list-item p{color:#64748b}
    .quick-actions{display:grid;gap:12px}
    .action{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:18px;font-weight:800;color:#1e3a8a}
    @media(max-width:900px){.dashboard{grid-template-columns:1fr}.sidebar{display:none}.content-grid{grid-template-columns:1fr}.topbar{display:block}.profile{margin-top:18px;width:max-content}}
  </style>
</head>

<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard-ui.js"></script>

</body>
</html>
